  header h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
  header p{color:var(--muted);font-size:14px;margin-top:4px}

  .resumen{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .resumen .full{grid-column:1 / -1}
  .pill{background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);border:1px solid var(--line)}
  .pill .label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .pill .num{font-size:24px;font-weight:800;margin-top:2px}
  .pill.total .num{color:var(--guinda)}
  .pill.alerta{display:flex;align-items:center;gap:12px;border-left:5px solid var(--red);background:var(--red-soft)}
  .pill.alerta.ninguna{border-left-color:var(--green);background:var(--green-soft)}
  .pill.alerta .ico{font-size:22px}
  .pill.alerta .txt{font-size:14px;font-weight:600}
  .pill.alerta .txt small{display:block;font-weight:500;color:var(--muted)}

  .btn-add{width:100%;background:var(--guinda);color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:var(--shadow);margin-bottom:18px;transition:transform .06s,filter .15s}
  .btn-add:hover{filter:brightness(1.12)}
  .btn-add:active{transform:scale(.99)}

  .form{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:18px;display:none}
  .form.abierto{display:block}
  .form h2{font-size:16px;margin-bottom:12px}
  .campo{margin-bottom:13px}
  .campo label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .campo input[type=text],.campo input[type=number],.campo input[type=date],.campo select{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;font-family:inherit;color:var(--ink);background:#fff}
  .campo input:focus,.campo select:focus{outline:none;border-color:var(--guinda)}
  .cat-pick{display:flex;gap:8px}
  .cat-pick button{flex:1;padding:11px 6px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer}
  .cat-pick button.sel[data-cat=casa]{background:var(--casa-soft);border-color:var(--casa);color:var(--casa)}
  .cat-pick button.sel[data-cat=oficina]{background:var(--ofi-soft);border-color:var(--ofi);color:var(--ofi)}
  .cat-pick button.sel[data-cat=otros]{background:var(--otros-soft);border-color:var(--otros);color:var(--otros)}
  .form-acciones{display:flex;gap:10px;margin-top:6px}
  .form-acciones button{flex:1;padding:13px;border-radius:11px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none}
  .guardar{background:var(--guinda);color:#fff}
  .cancelar{background:#fff;color:var(--muted);border:1.5px solid var(--line)}

  .filtros{display:flex;gap:8px;margin-bottom:10px}
  .filtros button{flex:1;padding:9px 4px;border-radius:10px;border:1.5px solid var(--line);background:var(--card);font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer}
  .filtros button.activo{background:var(--guinda);color:#fff;border-color:var(--guinda)}
  .filtros.cat{margin-bottom:16px}
  .filtros.cat button.activo{background:var(--ink);border-color:var(--ink)}

  .lista{display:flex;flex-direction:column;gap:10px}
  .recibo{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
  .recibo.vencido{border-left-color:var(--red)}
  .recibo.porvencer{border-left-color:var(--amber)}
  .recibo.pagado{border-left-color:var(--green);opacity:.78}
  .recibo .fila{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .recibo .concepto{font-size:17px;font-weight:700}
  .recibo .monto{font-size:18px;font-weight:800;white-space:nowrap}
  .recibo .meta{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap}
  .recibo .fecha{font-size:13px;color:var(--muted)}
  .estado{font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px}
  .estado.vencido{background:var(--red-soft);color:var(--red)}
  .estado.porvencer{background:var(--amber-soft);color:var(--amber)}
  .estado.atiempo{background:var(--otros-soft);color:var(--otros)}
  .estado.pagado{background:var(--green-soft);color:var(--green)}
  .cat-tag{font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px}
  .cat-tag.casa{background:var(--casa-soft);color:var(--casa)}
  .cat-tag.oficina{background:var(--ofi-soft);color:var(--ofi)}
  .cat-tag.otros{background:var(--otros-soft);color:var(--otros)}
  .tag-rep{font-size:11px;color:var(--muted);background:#efe9df;border-radius:20px;padding:3px 8px;font-weight:600}
  .recibo .botones{display:flex;gap:8px;margin-top:12px}
  .recibo .botones button{flex:1;padding:10px;border-radius:9px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:none}
  .b-pagar{background:var(--green);color:#fff}
  .b-revertir{background:#fff;color:var(--guinda);border:1.5px solid var(--guinda)!important}
  .b-cal{background:#fff;color:var(--guinda);border:1.5px solid var(--guinda-soft)!important;flex:0 0 auto!important;width:46px;font-size:18px}
  .b-borrar{background:#fff;color:var(--red);border:1.5px solid var(--red-soft)!important;flex:0 0 auto!important;width:46px;font-size:18px}

  .vacio{text-align:center;color:var(--muted);padding:40px 20px;font-size:15px}
  .vacio .ico{font-size:34px;display:block;margin-bottom:8px}
  .cargando{text-align:center;color:var(--muted);padding:30px}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:26px;line-height:1.6}
</style>
</head>
<body>
  <header>
    <div class="brand">Focaris Bienes Raíces</div>
    <h1>Control de Recibos</h1>
    <p>Anota lo que tienes que pagar y la app te avisa antes de que venza.</p>
  </header>

  <div class="resumen" id="resumen"></div>

  <button class="btn-add" id="btnAbrir">+ Agregar recibo</button>

  <div class="form" id="form">
    <h2 id="formTitulo">Nuevo recibo</h2>
    <div class="campo">
      <label for="concepto">¿De qué es el recibo?</label>
      <input type="text" id="concepto" placeholder="Ej. Luz CFE, Renta oficina, Internet…">
    </div>
    <div class="campo">
      <label>¿Es de la casa o de la oficina?</label>
      <div class="cat-pick" id="catPick">
        <button type="button" data-cat="casa" class="sel">🏠 Casa</button>
        <button type="button" data-cat="oficina">🏢 Oficina</button>
        <button type="button" data-cat="otros">• Otros</button>
      </div>
    </div>
    <div class="campo">
      <label for="monto">¿Cuánto se paga? (pesos)</label>
      <input type="number" id="monto" placeholder="0.00" inputmode="decimal" min="0" step="0.01">
    </div>
    <div class="campo">
      <label for="fecha">¿Qué día se vence?</label>
      <input type="date" id="fecha">
    </div>
    <div class="campo">
      <label for="frecuencia">¿Se repite este pago?</label>
      <select id="frecuencia">
        <option value="ninguna">No se repite (una sola vez)</option>
        <option value="semanal">Cada semana</option>
        <option value="quincenal">Cada quincena (15 días)</option>
        <option value="mensual">Cada mes</option>
        <option value="anual">Cada año</option>
      </select>
    </div>
    <div class="form-acciones">
      <button class="cancelar" id="btnCancelar">Cancelar</button>
      <button class="guardar" id="btnGuardar">Guardar recibo</button>
    </div>
  </div>

  <div class="filtros" id="filtros">
    <button data-f="pendientes" class="activo">Por pagar</button>
    <button data-f="pagados">Pagados</button>
    <button data-f="todos">Todos</button>
  </div>
  <div class="filtros cat" id="filtrosCat">
    <button data-c="todas" class="activo">Todas</button>
    <button data-c="casa">🏠 Casa</button>
    <button data-c="oficina">🏢 Oficina</button>
    <button data-c="otros">Otros</button>
  </div>

  <div class="lista" id="lista"><div class="cargando">Cargando tus recibos…</div></div>

  <footer>
    Tus recibos se guardan automáticamente.<br>
    La app te avisa con colores cuando la abres.
  </footer>

<script>
const KEY = 'recibos_focaris';
let recibos = [];
let filtro = 'pendientes';
let catFiltro = 'todas';
let catNueva = 'casa';

const CATS = {casa:{e:'🏠',t:'Casa'}, oficina:{e:'🏢',t:'Oficina'}, otros:{e:'•',t:'Otros'}};
const FREC = {semanal:'cada semana', quincenal:'cada quincena', mensual:'cada mes', anual:'cada año'};

function hoy(){ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function aFecha(str){ const [a,m,d]=str.split('-').map(Number); return new Date(a,m-1,d); }
function fmtISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function diasRestantes(str){ return Math.round((aFecha(str)-hoy())/86400000); }
function formatoFecha(str){ const d=aFecha(str); const m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']; return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear(); }
function sumarDias(str,n){ const d=aFecha(str); d.setDate(d.getDate()+n); return fmtISO(d); }
function sumarUnMes(str){ const d=aFecha(str), dia=d.getDate(); d.setMonth(d.getMonth()+1); if(d.getDate()<dia) d.setDate(0); return fmtISO(d); }
function sumarUnAnio(str){ const d=aFecha(str); d.setFullYear(d.getFullYear()+1); return fmtISO(d); }
function siguienteFecha(str,f){
  if(f==='semanal')   return sumarDias(str,7);
  if(f==='quincenal') return sumarDias(str,15);
  if(f==='mensual')   return sumarUnMes(str);
  if(f==='anual')     return sumarUnAnio(str);
  return str;
}
function pesos(n){ return '$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function cargar(){
  try{
    const raw = localStorage.getItem(KEY);
    recibos = raw ? JSON.parse(raw) : [];
  }catch(e){ recibos = []; }
  recibos = recibos.map(r=>({
    ...r,
    categoria: r.categoria || 'otros',
    frecuencia: r.frecuencia || (r.recurrente ? 'mensual' : 'ninguna')
  }));
  render();
}
function guardar(){
  try{ localStorage.setItem(KEY, JSON.stringify(recibos)); }
  catch(e){ console.error('No se pudo guardar', e); }
}

function estadoDe(r){
  if(r.pagado) return {clase:'pagado', etiqueta:'Pagado', txt:'Pagado el '+formatoFecha(r.fechaPago)};
  const d = diasRestantes(r.fecha);
  if(d < 0)   return {clase:'vencido',   etiqueta:'Vencido',    txt:'Venció hace '+Math.abs(d)+(Math.abs(d)===1?' día':' días')};
  if(d === 0) return {clase:'vencido',   etiqueta:'Hoy',        txt:'¡Se vence hoy!'};
  if(d <= 7)  return {clase:'porvencer', etiqueta:'Por vencer', txt:'Vence en '+d+(d===1?' día':' días')};
  return {clase:'atiempo', etiqueta:'A tiempo', txt:'Vence en '+d+' días'};
}

function render(){
  const baseCat = catFiltro==='todas' ? recibos : recibos.filter(r=>r.categoria===catFiltro);
  const pendientes = baseCat.filter(r=>!r.pagado);
  const vencidos = pendientes.filter(r=>diasRestantes(r.fecha) < 0);
  const proximos = pendientes.filter(r=>{const d=diasRestantes(r.fecha); return d>=0 && d<=7;});
  const totalPend = pendientes.reduce((s,r)=>s+Number(r.monto||0),0);
  const etqCat = catFiltro==='todas' ? '' : ' ('+CATS[catFiltro].t+')';

  let alerta;
  if(vencidos.length || proximos.length){
    const partes=[];
    if(vencidos.length) partes.push(vencidos.length+' vencido'+(vencidos.length>1?'s':''));
    if(proximos.length) partes.push(proximos.length+' por vencer');
    alerta='<div class="pill alerta full"><span class="ico">⚠️</span><span class="txt">'+partes.join(' y ')+
      '<small>Revisa la lista de abajo'+etqCat+'</small></span></div>';
  }else{
    alerta='<div class="pill alerta ninguna full"><span class="ico">✅</span><span class="txt">Todo en orden'+
      '<small>No tienes pagos urgentes'+etqCat+'</small></span></div>';
  }
  document.getElementById('resumen').innerHTML = alerta +
    '<div class="pill total"><div class="label">Total por pagar'+etqCat+'</div><div class="num">'+pesos(totalPend)+'</div></div>'+
    '<div class="pill"><div class="label">Recibos pendientes</div><div class="num">'+pendientes.length+'</div></div>';

  let items = baseCat.slice();
  if(filtro==='pendientes') items = items.filter(r=>!r.pagado);
  else if(filtro==='pagados') items = items.filter(r=>r.pagado);

  items.sort((a,b)=>{
    if(a.pagado!==b.pagado) return a.pagado?1:-1;
    return aFecha(a.fecha)-aFecha(b.fecha);
  });

  const lista = document.getElementById('lista');
  if(items.length===0){
    const msg = filtro==='pagados' ? 'Aún no marcas ningún recibo como pagado aquí.'
              : filtro==='pendientes' ? 'No tienes recibos por pagar aquí. ¡Agrega uno con el botón guinda de arriba!'
              : 'No has agregado recibos aquí todavía.';
    lista.innerHTML = '<div class="vacio"><span class="ico">🧾</span>'+msg+'</div>';
    return;
  }

  lista.innerHTML = items.map(function(r){
    const e = estadoDe(r);
    const c = CATS[r.categoria] || CATS.otros;
    const rep = (r.frecuencia && r.frecuencia!=='ninguna') ? '<span class="tag-rep">🔁 '+FREC[r.frecuencia]+'</span>' : '';
    return '<div class="recibo '+e.clase+'">'+
      '<div class="fila"><div class="concepto">'+escapar(r.concepto)+'</div><div class="monto">'+pesos(r.monto)+'</div></div>'+
      '<div class="meta">'+
        '<span class="cat-tag '+r.categoria+'">'+c.e+' '+c.t+'</span>'+
        '<span class="estado '+e.clase+'">'+e.etiqueta+'</span>'+
        '<span class="fecha">'+e.txt+'</span>'+ rep +
      '</div>'+
      '<div class="botones">'+
        (r.pagado
          ? '<button class="b-revertir" onclick="revertir(\''+r.id+'\')">Marcar como NO pagado</button>'
          : '<button class="b-pagar" onclick="pagar(\''+r.id+'\')">✓ Ya lo pagué</button>'+
            '<button class="b-cal" onclick="abrirCalendar(\''+r.id+'\')" title="Agregar a Google Calendar">📅</button>')+
        '<button class="b-borrar" onclick="borrar(\''+r.id+'\')" title="Eliminar">🗑</button>'+
      '</div>'+
    '</div>';
  }).join('');
}
function escapar(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function nuevoId(){ return 'r'+Date.now()+Math.random().toString(36).slice(2,6); }
function pagar(id){
  const r = recibos.find(x=>x.id===id); if(!r) return;
  r.pagado = true;
  const d=hoy(); r.fechaPago = fmtISO(d);
  if(r.frecuencia && r.frecuencia!=='ninguna'){
    recibos.push({
      id:nuevoId(), concepto:r.concepto, monto:r.monto,
      fecha:siguienteFecha(r.fecha, r.frecuencia),
      categoria:r.categoria, frecuencia:r.frecuencia,
      pagado:false, fechaPago:null
    });
  }
  guardar(); render();
}
function revertir(id){ const r=recibos.find(x=>x.id===id); if(!r) return; r.pagado=false; r.fechaPago=null; guardar(); render(); }
function borrar(id){
  if(!confirm('¿Eliminar este recibo? No se puede deshacer.')) return;
  recibos = recibos.filter(x=>x.id!==id); guardar(); render();
}
function abrirCalendar(id){
  const r = recibos.find(x=>x.id===id); if(!r) return;
  const f = r.fecha.replace(/-/g,'');
  const ini = f+'T090000', fin = f+'T093000';
  const c = CATS[r.categoria] || CATS.otros;
  const titulo = encodeURIComponent('💳 Pagar: '+r.concepto+' ('+pesos(r.monto)+')');
  const detalles = encodeURIComponent('Categoría: '+c.t+'. Recibo de tu app Control de Recibos — Focaris.');
  const url = 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+titulo+
    '&dates='+ini+'/'+fin+'&ctz=America/Ciudad_Juarez&details='+detalles;
  window.open(url, '_blank');
}

const form = document.getElementById('form');
function abrirForm(){
  form.classList.add('abierto');
  document.getElementById('btnAbrir').style.display='none';
  document.getElementById('concepto').focus();
}
function cerrarForm(){
  form.classList.remove('abierto');
  document.getElementById('btnAbrir').style.display='block';
  document.getElementById('concepto').value='';
  document.getElementById('monto').value='';
  document.getElementById('fecha').value='';
  document.getElementById('frecuencia').value='ninguna';
  catNueva='casa';
  pintarCat();
}
function pintarCat(){
  document.querySelectorAll('#catPick button').forEach(b=>b.classList.toggle('sel', b.dataset.cat===catNueva));
}
document.getElementById('catPick').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return; catNueva=b.dataset.cat; pintarCat();
});
document.getElementById('btnAbrir').onclick = abrirForm;
document.getElementById('btnCancelar').onclick = cerrarForm;
document.getElementById('btnGuardar').onclick = ()=>{
  const concepto = document.getElementById('concepto').value.trim();
  const monto = document.getElementById('monto').value;
  const fecha = document.getElementById('fecha').value;
  if(!concepto){ alert('Escribe de qué es el recibo.'); return; }
  if(!monto || Number(monto)<=0){ alert('Escribe cuánto se paga.'); return; }
  if(!fecha){ alert('Elige la fecha en que se vence.'); return; }
  recibos.push({
    id:nuevoId(), concepto, monto:Number(monto), fecha,
    categoria:catNueva, frecuencia:document.getElementById('frecuencia').value,
    pagado:false, fechaPago:null
  });
  guardar(); cerrarForm(); render();
};

document.getElementById('filtros').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  filtro=b.dataset.f;
  document.querySelectorAll('#filtros button').forEach(x=>x.classList.toggle('activo', x===b));
  render();
});
document.getElementById('filtrosCat').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  catFiltro=b.dataset.c;
  document.querySelectorAll('#filtrosCat button').forEach(x=>x.classList.toggle('activo', x===b));
  render();
});

cargar();
</script>
</body>
</html>
